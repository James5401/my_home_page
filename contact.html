<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Ebenezer Cobbinah</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="testimonial.html">Testimonials</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="glass-card" style="text-align: center;">
            <h1>Get In Touch</h1>
            <p>Have a question or want to collaborate? Send me a message!</p>
            
            <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem;">
                <a href="#" class="btn" style="background: #3b5998;">Facebook</a>
                <a href="#" class="btn" style="background: #e1306c;">Instagram</a>
                <a href="#" class="btn" style="background: #1da1f2;">Twitter</a>
            </div>
        </section>

        <section class="glass-card">
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="Collaboration Proposal">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="How can I help you?" required></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Jason Platinum (Ebenezer Cobbinah). All rights reserved.</p>
    </footer>

    <script src="javascript.js"></script>
</body>
</html>
