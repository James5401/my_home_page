<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | 0xide</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scanline"></div>
    <div class="grid-bg"></div>

    <header>
        <nav>
            <a href="index.html" class="nav-logo">&lt;0xide/&gt;</a>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="testimonial.html">Testimonials</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-header" style="text-align: center;">
            <span class="page-tag">&gt; ssh 0xide@connect</span>
            <h1><span class="text-gradient">Get In</span> Touch</h1>
            <p>Have a question or want to collaborate? Open a connection.</p>

            <div class="social-buttons" style="margin-top: var(--spacing-lg);">
                <a href="#" class="social-btn facebook">Facebook</a>
                <a href="#" class="social-btn instagram">Instagram</a>
                <a href="#" class="social-btn twitter">Twitter</a>
            </div>
        </section>

        <section class="glass-card" style="max-width: 650px; margin: 0 auto;">
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">// full_name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">// email_address</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="subject">// subject</label>
                    <input type="text" id="subject" name="subject" placeholder="Collaboration Proposal">
                </div>
                <div class="form-group">
                    <label for="message">// message</label>
                    <textarea id="message" name="message" rows="5" placeholder="How can I help you?" required></textarea>
                </div>
                <button type="submit" class="btn btn-submit">&gt;_ Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <span class="footer-logo">&lt;0xide/&gt;</span>
            <p>&copy; 2026 Ebenezer Cobbinah. All rights reserved.</p>
            <p class="mono-text footer-tagline">// building the future, one bit at a time</p>
        </div>
    </footer>

    <script type="module" src="javascript.js"></script>
</body>
</html>
